services:
  postgres:
    image: postgres:17-alpine
    container_name: kachalka-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kachalka}
      POSTGRES_USER: ${POSTGRES_USER:-kachalka}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kachalka_dev_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - kachalka_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kachalka} -d ${POSTGRES_DB:-kachalka}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  kachalka_postgres_data:
