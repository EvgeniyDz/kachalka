services:
  postgres:
    image: postgres:17-alpine
    container_name: kachalka-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kachalka}
      POSTGRES_USER: ${POSTGRES_USER:-kachalka}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kachalka_dev_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - kachalka_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kachalka} -d ${POSTGRES_DB:-kachalka}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: kachalka-backend
    restart: unless-stopped
    environment:
      APP_NAME: ${APP_NAME:-Kachalka API}
      APP_ENV: ${APP_ENV:-development}
      APP_DEBUG: ${APP_DEBUG:-true}
      API_V1_PREFIX: ${API_V1_PREFIX:-/api/v1}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-kachalka}:${POSTGRES_PASSWORD:-kachalka_dev_password}@postgres:5432/${POSTGRES_DB:-kachalka}
      CORS_ORIGINS: '["http://localhost:5173","http://127.0.0.1:5173"]'
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "python -m alembic upgrade head &&
             python -m app.db.seed &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build:
      context: ./frontend
    container_name: kachalka-frontend
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000/api/v1}
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - kachalka_frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0 --port 5173

volumes:
  kachalka_postgres_data:
  kachalka_frontend_node_modules:
